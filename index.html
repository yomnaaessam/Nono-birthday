<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Surprise | نونو</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <script>
      function checkPassword() {
        var p = prompt("أدخل تاريخ ميلادك السري (يوم/شهر/سنة):", "");
        if (p !== "20/4/2000") {
          if (p !== null) alert("خطأ! ركز يا نونو وافتكر تاريخ ميلادك..");
          checkPassword();
        } else {
          // أول ما يدوس OK الموسيقى تشتغل فوراً
          var audio = document.getElementById("myAudio");
          audio.play().catch(function(e) { console.log("تحتاج لمسة") });
        }
      }
      window.onload = checkPassword;
    </script>
    <style>
        :root { --primary: #ff758c; --dark: #2d3436; }
        body { margin: 0; padding: 0; font-family: 'Cairo', sans-serif; background: #fdfdfe; min-height: 100vh; display: flex; flex-direction: column; align-items: center; text-align: center; color: var(--dark); overflow-x: hidden; }
        .hearts { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: -1; }
        .container { background: rgba(255, 255, 255, 0.98); padding: 35px 25px; border-radius: 35px; box-shadow: 0 20px 50px rgba(0,0,0,0.08); width: 85%; max-width: 420px; margin: 40px 20px; border: 1px solid rgba(255, 117, 140, 0.2); }
        h1 { color: var(--primary); font-size: 1.7em; margin-bottom: 5px; }
        .timer { background: var(--primary); color: white; padding: 10px 20px; border-radius: 50px; display: inline-block; font-size: 0.95em; margin: 20px 0; font-weight: bold; }
        .slider-frame { position: relative; width: 100%; height: 380px; border-radius: 25px; overflow: hidden; margin: 25px 0; background: #f8f9fa; border: 4px solid #fff; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .slider-frame img { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; opacity: 0; transition: opacity 1.5s ease-in-out; }
        .slider-frame img.active { opacity: 1; }
        .message { line-height: 1.7; color: #555; font-size: 1.05em; margin: 15px 0; }
        /* المشغل بقى مخفي عشان يشتغل لوحده من غير ما يظهر الزرار لو مش عايزاه */
        audio { width: 100%; height: 40px; margin-top: 25px; border-radius: 20px; }
    </style>
</head>
<body>
    <div class="hearts" id="hearts-container"></div>
    <div class="container">
        <h1>كل سنة وأنت طيب يا نونو ✨</h1>
        <div class="timer" id="countdown">باقي القليل على يوم ميلادك</div>
        
        <div class="slider-frame" id="slider">
            <img src="1.jpg" class="active">
            <img src="2.jpg">
            <img src="3.jpg">
        </div>

        <div class="message">
            <h2 style="color: #ff758c; font-size: 1.3em;">رسالة خاصة ليك.. ✨</h2>
            <p>كل سنة وأنت طيب يا أحلى نونو في الدنيا! ❤️</p>
            <p>حبيت أعملك حاجة مختلفة السنة دي، موقع خاص بيك لوحدك يجمع ذكرياتنا البسيطة.</p>
            <p>أتمنى السنة دي تكون بداية لكل حاجة حلوة بتتمناها، وتفضل دايماً الضحكة مش مفارقة وشك. 🎂🎈</p>
            <p style="font-weight: bold; color: #ff758c;">- يمنى -</p>
        </div>

        <audio id="myAudio" controls loop>
            <source src="music.mp3" type="audio/mpeg">
        </audio>
    </div>

    <script>
        const target = new Date("April 20, 2026 00:00:00").getTime();
        setInterval(() => {
            const now = new Date().getTime();
            const diff = target - now;
            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            document.getElementById("countdown").innerHTML = `باقي ${d} يوم و ${h} ساعة على يوم ميلادك`;
        }, 1000);

        const slides = document.querySelectorAll('#slider img');
        let current = 0;
        setInterval(() => {
            slides[current].classList.remove('active');
            current = (current + 1) % slides.length;
            slides[current].classList.add('active');
        }, 4000);

        function addHeart() {
            const h = document.createElement("div");
            h.innerHTML = "❤️";
            h.style.cssText = `position:fixed; left:${Math.random()*100}vw; top:-20px; font-size:${Math.random()*15+10}px; opacity:${Math.random()}; pointer-events:none; transition: top 6s linear, opacity 6s;`;
            document.getElementById("hearts-container").appendChild(h);
            setTimeout(() => { h.style.top = "110vh"; h.style.opacity = "0"; }, 100);
            setTimeout(() => h.remove(), 7000);
        }
        setInterval(addHeart, 500);
    </script>
</body>
</html>
