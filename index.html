<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Surprise | نونو</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <script>
      function checkPassword() {
        var p = prompt("أدخل تاريخ ميلادك السري (يوم/شهر/سنة):", "");
        if (p !== "20/4/2000") {
          if (p !== null) alert("خطأ! ركز يا نونو..");
          checkPassword();
        } else {
          // لما الباسورد يصح، نظهر طبقة "الدخول"
          document.getElementById("overlay").style.display = "flex";
        }
      }
      
      function startEverything() {
        var audio = document.getElementById("myAudio");
        // أمر تشغيل الموسيقى
        audio.play().then(() => {
            console.log("الموسيقى بدأت بنجاح");
        }).catch(e => {
            console.log("المتصفح يحتاج لمسة لتشغيل الصوت");
        });
        
        // إخفاء طبقة الدخول وإظهار المحتوى
        document.getElementById("overlay").style.display = "none";
        document.getElementById("mainContent").style.opacity = "1";
      }
      
      window.onload = checkPassword;
    </script>

        /* طبقة الدخول - ضرورية لتفعيل الصوت */

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        #mainContent { opacity: 0; transition: opacity 1s ease-in; display: flex; flex-direction: column; align-items: center; text-align: center; }
        .hearts { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: -1; }
        .container { background: white; padding: 35px 25px; border-radius: 35px; box-shadow: 0 20px 50px rgba(0,0,0,0.06); width: 85%; max-width: 420px; margin: 40px 20px; border: 1px solid #fceef0; }
